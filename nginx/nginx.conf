events {
    worker_connections 1024;
}

http {

    # ─── Rate Limiting Zone ───────────────────────────────────────────
    # 10 requests per second per IP, stored in 10MB memory zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ─── Upstream — 3 WanderLust Instances ───────────────────────────
    upstream wanderlust_backend {
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;
    }

    # ─── Server Block ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # ─── Load Balance All API Requests ────────────────────────────
        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # Forward to backend instances
            proxy_pass http://wanderlust_backend;

            # Pass real client info to backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
    }
}
