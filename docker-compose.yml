services:

  # ─── MongoDB ─────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: trafficshield_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - trafficshield_network
    restart: always                    # ← auto-restart

  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: trafficshield_redis
    ports:
      - "6379:6379"
    networks:
      - trafficshield_network
    restart: always                    # ← auto-restart

  # ─── WanderLust Instance 1 ───────────────────────
  backend_8001:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wanderlust_8001
    environment:
      - PORT=8001
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=wanderlust
      - REDIS_HOST=redis
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
      - redis
    networks:
      - trafficshield_network
    restart: always                    # ← auto-restart if crashed
    healthcheck:                       # ← health monitoring
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── WanderLust Instance 2 ───────────────────────
  backend_8002:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wanderlust_8002
    environment:
      - PORT=8002
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=wanderlust
      - REDIS_HOST=redis
    ports:
      - "8002:8002"
    depends_on:
      - mongodb
      - redis
    networks:
      - trafficshield_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── WanderLust Instance 3 ───────────────────────
  backend_8003:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wanderlust_8003
    environment:
      - PORT=8003
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=wanderlust
      - REDIS_HOST=redis
    ports:
      - "8003:8003"
    depends_on:
      - mongodb
      - redis
    networks:
      - trafficshield_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Prometheus ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: trafficshield_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - trafficshield_network
    restart: always

  # ─── Grafana ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: trafficshield_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trafficshield_network
    restart: always

# ─── Volumes & Networks ───────────────────────────
volumes:
  mongodb_data:
  grafana_data:

networks:
  trafficshield_network:
    driver: bridge
